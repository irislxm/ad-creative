<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>广告素材分析 · 5+6月 · 抽帧 + 5 维度洞察</title>
<style>
  :root {
    --bg: #f7f8fa;
    --bg-card: #ffffff;
    --bg-soft: #f1f3f7;
    --text: #1a1d24;
    --text-muted: #5b6373;
    --text-soft: #8b94a3;
    --border: #e5e8ee;
    --accent: #2557e8;
    --accent-soft: #e8efff;
    --hot: #e0383e;
    --gold: #d97706;
    --green: #0f7a5d;
    --shadow: 0 1px 3px rgba(20, 30, 60, 0.04), 0 4px 16px rgba(20, 30, 60, 0.06);
    --shadow-hover: 0 4px 12px rgba(20, 30, 60, 0.08), 0 12px 32px rgba(20, 30, 60, 0.10);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB",
                 "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Header */
  header.page-header {
    background: linear-gradient(135deg, #1a2236 0%, #2557e8 100%);
    color: #fff;
    padding: 36px 24px 28px;
  }
  header.page-header .wrap {
    max-width: 1280px; margin: 0 auto;
  }
  header.page-header h1 {
    margin: 0 0 8px;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  header.page-header p.sub {
    margin: 0; opacity: .85; font-size: 14px;
  }
  header.page-header .stat-row {
    display: flex; gap: 22px; margin-top: 18px;
    flex-wrap: wrap;
  }
  .stat {
    display: inline-flex; align-items: baseline; gap: 6px;
    background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12);
    padding: 6px 12px; border-radius: 999px; font-size: 13px;
  }
  .stat b { font-size: 16px; }

  /* Tabs */
  nav.tabs {
    background: #fff; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: saturate(180%) blur(8px);
  }
  nav.tabs .wrap {
    max-width: 1280px; margin: 0 auto; padding: 0 24px;
    display: flex; align-items: center; gap: 4px; height: 56px;
    overflow-x: auto;
  }
  .tab {
    padding: 8px 16px; border-radius: 8px;
    font-size: 14px; font-weight: 600; color: var(--text-muted);
    cursor: pointer; user-select: none; white-space: nowrap;
    border: 1px solid transparent;
    transition: all .15s;
  }
  .tab:hover { background: var(--bg-soft); color: var(--text); }
  .tab.active {
    background: var(--accent-soft); color: var(--accent); border-color: var(--accent);
  }
  .tab .count {
    margin-left: 6px; font-size: 12px; padding: 1px 6px;
    background: rgba(0,0,0,.08); border-radius: 10px; font-weight: 500;
  }
  .tab.active .count { background: rgba(37,87,232,.18); color: var(--accent); }

  /* Filter row */
  .filter-row {
    max-width: 1280px; margin: 0 auto; padding: 18px 24px 0;
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  }
  .search-box {
    flex: 1; min-width: 220px;
    display: flex; align-items: center; gap: 8px;
    background: #fff; border: 1px solid var(--border);
    border-radius: 8px; padding: 0 12px; height: 38px;
  }
  .search-box input {
    flex: 1; border: 0; outline: none; font-size: 14px;
    background: transparent; color: var(--text);
    font-family: inherit;
  }
  .search-box svg { width: 16px; height: 16px; opacity: .5; }
  .layout-toggle { display: inline-flex; gap: 4px; background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 3px; }
  .layout-toggle button {
    background: transparent; border: 0; padding: 5px 12px; font-size: 13px;
    border-radius: 6px; color: var(--text-muted); cursor: pointer;
    font-family: inherit;
  }
  .layout-toggle button.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }

  /* Grid */
  main { max-width: 1280px; margin: 0 auto; padding: 18px 24px 60px; }
  .grid {
    display: grid; gap: 20px;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  }
  .grid.list { grid-template-columns: 1fr; }

  .card {
    background: var(--bg-card); border-radius: 12px; overflow: hidden;
    box-shadow: var(--shadow); cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    display: flex; flex-direction: column;
  }
  .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
  .card .thumb {
    position: relative; aspect-ratio: 9/16; background: #000;
    overflow: hidden;
  }
  .card .thumb img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform .3s;
  }
  .card:hover .thumb img { transform: scale(1.04); }
  .card .play-btn {
    position: absolute; right: 10px; bottom: 10px;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,0,0,.55); border: 1.5px solid rgba(255,255,255,.85);
    display: flex; align-items: center; justify-content: center;
    color: #fff;
  }
  .card .play-btn::after {
    content: ''; width: 0; height: 0;
    border-left: 9px solid #fff; border-top: 6px solid transparent;
    border-bottom: 6px solid transparent; margin-left: 3px;
  }
  .card .badge-row {
    position: absolute; left: 8px; top: 8px; display: flex; gap: 4px; flex-wrap: wrap;
    max-width: calc(100% - 16px);
  }
  .badge {
    background: rgba(0,0,0,.7); color: #fff; font-size: 11px;
    padding: 2px 8px; border-radius: 4px; backdrop-filter: blur(4px);
    font-weight: 500;
  }
  .badge.hot { background: var(--hot); }
  .badge.gold { background: var(--gold); }
  .card .body { padding: 12px 14px 14px; flex: 1; }
  .card .hook-name {
    font-size: 14px; font-weight: 600; color: var(--text);
    line-height: 1.4; margin-bottom: 6px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card .audience-line {
    font-size: 12px; color: var(--text-muted);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card .meta-row {
    margin-top: 10px; display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--text-soft);
  }
  .meta-row .sid { font-family: ui-monospace, "SF Mono", Menlo, monospace; }

  /* List view */
  .grid.list .card {
    flex-direction: row; align-items: stretch;
    aspect-ratio: auto;
  }
  .grid.list .card .thumb {
    flex: 0 0 140px; aspect-ratio: 9/16; max-height: 220px;
  }
  .grid.list .card .body { padding: 14px 18px; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(15, 20, 35, .6);
    backdrop-filter: blur(3px);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #fff; border-radius: 14px;
    max-width: 1100px; width: 100%; max-height: 92vh;
    overflow: hidden; display: flex;
    box-shadow: 0 25px 60px rgba(0,0,0,.3);
  }
  .modal .left {
    flex: 0 0 38%; background: #000;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .modal .left video, .modal .left img {
    width: 100%; height: 100%; object-fit: contain; max-height: 92vh;
  }
  .modal .right {
    flex: 1; overflow-y: auto; padding: 28px 32px 32px;
    background: #fff;
  }
  .modal .close-btn {
    position: absolute; right: 14px; top: 14px; z-index: 5;
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(255,255,255,.9); border: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #333;
    transition: transform .15s;
  }
  .modal .close-btn:hover { transform: scale(1.1); }

  .modal h2 {
    margin: 0 0 8px; font-size: 22px; font-weight: 700;
    line-height: 1.35;
  }
  .modal .sub-meta {
    color: var(--text-muted); font-size: 13px; margin-bottom: 22px;
    display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
  }
  .modal .sub-meta a { color: var(--accent); }
  .modal .sub-meta .sid {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    background: var(--bg-soft); padding: 2px 7px; border-radius: 4px;
  }

  .field-block {
    margin-bottom: 22px; padding-bottom: 22px;
    border-bottom: 1px dashed var(--border);
  }
  .field-block:last-child { border-bottom: 0; padding-bottom: 0; }
  .field-block h3 {
    margin: 0 0 10px; font-size: 13px; font-weight: 600;
    color: var(--accent); text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex; align-items: center; gap: 6px;
  }
  .field-block h3::before {
    content: ''; width: 3px; height: 14px; background: var(--accent);
    border-radius: 2px;
  }
  .field-block .content {
    font-size: 14.5px; line-height: 1.75; color: var(--text);
    white-space: pre-wrap; word-break: break-word;
  }
  .field-block .content strong {
    color: var(--hot); font-weight: 700;
    background: linear-gradient(to bottom, transparent 60%, rgba(224,56,62,.15) 60%);
    padding: 0 1px;
  }

  /* Empty state */
  .empty {
    text-align: center; padding: 80px 20px;
    color: var(--text-soft);
  }
  .empty svg { width: 64px; height: 64px; opacity: .35; margin-bottom: 16px; }

  /* Footer */
  footer {
    text-align: center; padding: 32px 24px 60px;
    color: var(--text-soft); font-size: 12px;
  }

  /* Responsive */
  @media (max-width: 768px) {
    header.page-header { padding: 28px 18px 22px; }
    header.page-header h1 { font-size: 21px; }
    main { padding: 14px 16px 40px; }
    .filter-row { padding: 14px 16px 0; }
    nav.tabs .wrap { padding: 0 16px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .modal { flex-direction: column; max-height: 95vh; }
    .modal .left { flex: 0 0 auto; max-height: 45vh; }
    .modal .right { padding: 20px 22px; }
    .modal h2 { font-size: 18px; }
    .grid.list .card { flex-direction: column; }
    .grid.list .card .thumb { flex: 0 0 auto; max-height: none; }
  }
</style>
</head>
<body>

<header class="page-header">
  <div class="wrap">
    <h1>广告素材分析 · 5+6月 · 抽帧 + 5维度洞察</h1>
    <p class="sub">视频抽帧 + PaddleOCR + 心理学命名钩子 · 共 46 条素材（5月20 + 6月26），3 个类目 × 2 个月份</p>
    <div class="stat-row">
      <span class="stat">📦 <b id="stat-total">46</b> 条素材</span>
      <span class="stat">🗓️ <b>2</b> 个月对比</span>
      <span class="stat">🎯 <b id="stat-hooks">30+</b> 种钩子手法</span>
      <span class="stat">🔥 <b id="stat-hot">3</b> 条精品级</span>
    </div>
  </div>
</header>

<nav class="tabs">
  <div class="wrap" id="tabs"></div>
</nav>

<div class="filter-row">
  <div class="search-box">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search" type="text" placeholder="搜钩子名称 / 人群 / 卖点关键词…" />
  </div>
  <div class="layout-toggle">
    <button id="btn-grid" class="active" title="网格视图">⊞ 网格</button>
    <button id="btn-list" title="列表视图">≡ 列表</button>
  </div>
</div>

<main>
  <div id="grid" class="grid"></div>
  <div id="empty" class="empty" style="display:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <p>没有匹配的素材，换个关键词试试？</p>
  </div>
</main>

<footer>
  更新于 2026-07-02 · 抽帧分析工作流 ad-creative-analysis · v3.2（新增6月26条+双月切换）
</footer>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="left">
      <button class="close-btn" id="close-btn">×</button>
      <video id="m-video" controls preload="metadata" playsinline poster=""></video>
    </div>
    <div class="right" id="m-right"></div>
  </div>
</div>

<script>
let DATA = {};
let currentTab = '';
let currentLayout = 'grid';
let currentSearch = '';

// 加粗渲染：**xxx** → <strong>xxx</strong>
function renderBold(text) {
  if (!text) return '';
  // 转义 HTML
  const esc = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  return esc.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
}

// 提取钩子名（素材类型字段第一个"型"或"钩"前的描述）
function extractHookName(typeStr) {
  if (!typeStr) return '未命名';
  // 取（）前的部分
  const t = typeStr.split(/[（(]/)[0].trim();
  return t || typeStr.slice(0, 20);
}

// 短人群标签
function shortAudience(audStr) {
  if (!audStr) return '';
  // 取第一句"。"前 或前 50 字
  const first = audStr.split(/[。\n]/)[0];
  return first.length > 60 ? first.slice(0, 60) + '…' : first;
}

// 判断 hot/gold 标签
function getBadges(item) {
  const text = (item.type + item.hook3s + item.selling).toLowerCase();
  const badges = [];
  if (text.includes('精品') || text.includes('反认知钩中的精品') || text.includes('最具洞察')) {
    badges.push({ cls: 'hot', text: '🔥 精品' });
  }
  if (text.includes('强冲击') || text.includes('强引流') || text.includes('政策矩阵')) {
    badges.push({ cls: 'gold', text: '⚡ 强势' });
  }
  return badges;
}

function renderTabs() {
  const wrap = document.getElementById('tabs');
  wrap.innerHTML = '';
  const cats = Object.keys(DATA);
  cats.forEach((cat, i) => {
    const div = document.createElement('div');
    div.className = 'tab' + (cat === currentTab ? ' active' : '');
    div.innerHTML = `${cat} <span class="count">${DATA[cat].length}</span>`;
    div.onclick = () => { currentTab = cat; renderTabs(); renderCards(); };
    wrap.appendChild(div);
  });
}

function renderCards() {
  const grid = document.getElementById('grid');
  grid.className = 'grid' + (currentLayout === 'list' ? ' list' : '');
  grid.innerHTML = '';
  const items = (DATA[currentTab] || []).filter(item => {
    if (!currentSearch) return true;
    const q = currentSearch.toLowerCase();
    const all = (item.type + item.audience + item.hook3s + item.script + item.selling).toLowerCase();
    return all.includes(q);
  });
  if (items.length === 0) {
    document.getElementById('empty').style.display = 'block';
    return;
  }
  document.getElementById('empty').style.display = 'none';
  items.forEach(item => {
    const hookName = extractHookName(item.type);
    const aud = shortAudience(item.audience);
    const badges = getBadges(item);
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="thumb">
        <img src="${item.frame || ''}" alt="" loading="lazy" onerror="this.style.opacity=.2;this.alt='无首帧'" />
        <div class="badge-row">
          ${badges.map(b => `<span class="badge ${b.cls}">${b.text}</span>`).join('')}
        </div>
        <div class="play-btn"></div>
      </div>
      <div class="body">
        <div class="hook-name">${hookName}</div>
        <div class="audience-line">${aud}</div>
        <div class="meta-row">
          <span class="sid">${item.sid || '-'}</span>
        </div>
      </div>
    `;
    card.onclick = () => openModal(item);
    grid.appendChild(card);
  });
}

function openModal(item) {
  const modal = document.getElementById('modal');
  const video = document.getElementById('m-video');
  const right = document.getElementById('m-right');
  video.src = item.url || '';
  video.poster = item.frame || '';
  const hookName = extractHookName(item.type);
  right.innerHTML = `
    <h2>${hookName}</h2>
    <div class="sub-meta">
      <span class="sid">${item.sid}</span>
      <span>类目: <b>${currentTab}</b></span>
      <a href="${item.url}" target="_blank" rel="noopener">原始视频链接 ↗</a>
    </div>
    <div class="field-block">
      <h3>素材类型</h3>
      <div class="content">${renderBold(item.type)}</div>
    </div>
    <div class="field-block">
      <h3>转化人群</h3>
      <div class="content">${renderBold(item.audience)}</div>
    </div>
    <div class="field-block">
      <h3>黄金前 3s 分析</h3>
      <div class="content">${renderBold(item.hook3s)}</div>
    </div>
    <div class="field-block">
      <h3>脚本结构</h3>
      <div class="content">${renderBold(item.script)}</div>
    </div>
    <div class="field-block">
      <h3>卖点提炼</h3>
      <div class="content">${renderBold(item.selling)}</div>
    </div>
  `;
  modal.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  const modal = document.getElementById('modal');
  const video = document.getElementById('m-video');
  modal.classList.remove('show');
  video.pause(); video.src = '';
  document.body.style.overflow = '';
}

// Bind events
document.getElementById('close-btn').onclick = closeModal;
document.getElementById('modal').onclick = (e) => {
  if (e.target.id === 'modal') closeModal();
};
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});
document.getElementById('search').oninput = (e) => {
  currentSearch = e.target.value.trim();
  renderCards();
};
document.getElementById('btn-grid').onclick = () => {
  currentLayout = 'grid';
  document.getElementById('btn-grid').classList.add('active');
  document.getElementById('btn-list').classList.remove('active');
  renderCards();
};
document.getElementById('btn-list').onclick = () => {
  currentLayout = 'list';
  document.getElementById('btn-list').classList.add('active');
  document.getElementById('btn-grid').classList.remove('active');
  renderCards();
};

// Load
fetch('data.json')
  .then(r => r.json())
  .then(d => {
    DATA = d;
    currentTab = Object.keys(d)[0];
    const total = Object.values(d).reduce((a, b) => a + b.length, 0);
    document.getElementById('stat-total').textContent = total;
    // 统计
    const allHooks = new Set();
    let hot = 0;
    Object.values(d).flat().forEach(it => {
      const h = extractHookName(it.type);
      allHooks.add(h);
      if ((it.type + it.hook3s).includes('精品')) hot++;
    });
    document.getElementById('stat-hooks').textContent = allHooks.size + '+';
    document.getElementById('stat-hot').textContent = hot;
    renderTabs();
    renderCards();
  })
  .catch(err => {
    document.getElementById('grid').innerHTML = '<div class="empty">加载数据失败：' + err.message + '</div>';
  });
</script>

</body>
</html>
